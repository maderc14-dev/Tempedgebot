<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TempEdge Bot</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://api.open-meteo.com/v1/forecast"></script>
    <style>
        body {
            background-color: #121212;
            color: white;
            font-family: Arial, sans-serif;
        }
        /* Additional styles for dark theme */
        .city {
            margin: 20px;
            padding: 20px;
            border: 1px solid gray;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <h1>TempEdge Bot</h1>
    <div id="cities"></div>
    <script>
        const cities = [
            { name: 'City1', lat: 12.34, lon: 56.78 },
            { name: 'City2', lat: 23.45, lon: 67.89 },
            //... add all 23 cities with proper coordinates
        ];

        const apiKey = 'YOUR_API_KEY'; // Use your Open-Meteo API key here

        cities.forEach(city => {
            fetch(`https://api.open-meteo.com/v1/forecast?latitude=${city.lat}&longitude=${city.lon}&hourly=temperature_2m`)
                .then(response => response.json())
                .then(data => {
                    const cityDiv = document.createElement('div');
                    cityDiv.className = 'city';
                    cityDiv.innerHTML = `<h2>${city.name}</h2><p>Temperature: ${data.hourly.temperature_2m[0]}</p>`;
                    document.getElementById('cities').appendChild(cityDiv);
                })
                .catch(error => console.error('Error fetching data:', error));
        });
    </script>
</body>
</html>
